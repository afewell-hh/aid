    <p class="text-muted small">GET .../overlay: presence badge + the attached overlay YAML (PUT .../overlay). Without it the BOM's optic columns are blank.</p>
    <div class="card"><div class="card-header d-flex justify-content-between align-items-center"><span>Optic / identity overlay <span class="badge text-bg-secondary"><span aria-hidden="true">○ </span><span>none</span></span></span><button id="overlay-save-btn" class="btn btn-success btn-sm">Save overlay</button></div><div class="card-body"><div id="overlay-error" class="mb-2" role="alert" aria-live="assertive"></div><div class="form-text mb-2">The overlay supplies optic SKUs/identity — without it the BOM's optic columns are blank.</div><textarea id="overlay-yaml" class="form-control font-monospace" rows="14" spellcheck="false" placeholder="items:
  - id: { name: my-optic, version: '1' }
    ..." style=""></textarea></div></div>
  </main>
