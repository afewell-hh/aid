      switch:
        port: mesh-switch-a-0/E1/2
---
apiVersion: wiring.githedgehog.com/v1beta1
kind: Connection
metadata:
  name: mesh-switch-a-0--mesh--mesh-switch-b-0
spec:
  mesh:
    links:
    - leaf1:
        port: mesh-switch-a-0/E1/3
      leaf2:
        port: mesh-switch-b-0/E1/1
    - leaf1:
        port: mesh-switch-a-0/E1/4
      leaf2:
        port: mesh-switch-b-0/E1/2
    - leaf1:
        port: mesh-switch-a-0/E1/5
      leaf2:
        port: mesh-switch-b-0/E1/3
    - leaf1:
        port: mesh-switch-a-0/E1/6
      leaf2:
