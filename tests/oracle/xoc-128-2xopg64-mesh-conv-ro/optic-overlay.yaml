# AID-owned optic/description catalog OVERLAY for the xoc-128 BOM projection (F5).
#
# Per-composition overlay (Issue #62, lead decision: per-composition not shared).
# Same provenance discipline as the xoc-64 overlay (tests/fixtures/f3/optic-
# overlay.yaml; D1/D12): training.yaml `module_types` carry only {id, manufacturer,
# model}. bom.csv columns 7–19 (cage/medium/connector/standard/reach/wavelength/
# lanes/breakout) and the manufacturer/description casing are PUBLIC OPTICAL-
# STANDARD FACTS that AID OWNS. Authored BY HAND from public facts — NOT read back
# from bom.csv (circular) and NOT imported from HNP seed_catalog.py. Merged by
# pinned id onto the catalog extracted from training.yaml.
#
# What differs from the xoc-64 overlay (note §3.3):
#   1. NEW transceiver SKU `osfp_200g_dr4` (200GBASE-DR4: 4 lanes × 50 Gbps/lane
#      PAM4, 1310 nm, SMF, MPO-12, DR reach — IEEE 802.3 public facts). xoc-128
#      has NO switch_transceiver rows, so only the two server-side OSFP DR4 optics
#      appear.
#   2. NEW per-OPG `_a/_b` class ids for descriptive identity (cols 2+5). The
#      bom.csv identity is an inconsistent mix AID must pin exactly: switches use
#      the device-type SLUG (celestica-ds5000/ds2000) EXCEPT oob_leaf which uses
#      the MODEL string (Celestica DS1000); manufacturer is title-cased.
items:
  # --- server transceiver SKUs (cols 7–19) -----------------------------------
  - id: { name: osfp_400g_dr4, version: "1" }
    kind: transceiver
    layer: hardware_type
    manufacturer: Generic
    model: OSFP-400G-DR4
    description: ""
    calc_profile:
      cage_type: OSFP
      medium: SMF
      connector: MPO-12
      standard: 400GBASE-DR4
      reach_class: DR
      wavelength_nm: "1310"
      host_lane_count: "4"
      host_serdes_gbps_per_lane: "100"
      optical_lane_pattern: DR4
      gearbox_present: "false"
      cable_assembly_type: none
      breakout_topology: 1x
      is_cable_assembly: "false"

  - id: { name: osfp_200g_dr4, version: "1" }
    kind: transceiver
    layer: hardware_type
    manufacturer: Generic
    model: OSFP-200G-DR4
    description: ""
    calc_profile:
      cage_type: OSFP
      medium: SMF
      connector: MPO-12
      standard: 200GBASE-DR4
      reach_class: DR
      wavelength_nm: "1310"
      host_lane_count: "4"
      host_serdes_gbps_per_lane: "50"
      optical_lane_pattern: DR4
      gearbox_present: "false"
      cable_assembly_type: none
