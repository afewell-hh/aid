# Invalid fixture: MCLAG redundancy with an ODD switch_count.
# MCLAG requires an even switch_count >= 2 (DOMAIN_MODEL.md FabricDomain
# invariants; schema enforces it via an if/then multipleOf 2 on switch_count).
# This plan is otherwise schema-valid; the sole violation is the odd count.
id: mclag-odd-count
name: Invalid Odd MCLAG Count
customer_name: Reference Lab
status: draft

device_catalog:
  - id: leaf-switch
    name: Reference Leaf Switch
    slug: leaf-switch
    category: network

fabric_domains:
  - fabric_id: frontend
    fabric_name: frontend
    fabric_class: managed
    topology_mode: clos
    switch_entry_ids:
      - server-leafs

entries:
  - entry_id: server-leafs
    device_class_id: leaf-switch
    quantity: 3
    role: server-leaf
    fabric_id: frontend
    topology_mode: clos
    redundancy:
      type: mclag
      switch_count: 3
    port_zones:
      - zone_id: leaf-server
        zone_name: server-access
        zone_type: server
        port_range: "1-48"
        priority: 0
        allocation: sequential
