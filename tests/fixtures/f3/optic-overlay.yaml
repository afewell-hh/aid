# AID-owned optic/description catalog OVERLAY for the xoc-64 BOM projection (F3).
#
# Provenance (note §3.2, §0.4; D1/D12): training.yaml `module_types` carry only
# {id, manufacturer, model}. bom.csv columns 7–19 (cage/medium/connector/standard/
# reach/wavelength/lanes/breakout) and the manufacturer/description casing are
# PUBLIC OPTICAL-STANDARD FACTS that AID OWNS in its catalog `calc_profile` plane.
# They are authored here BY HAND from public facts — NOT read back from bom.csv
# (circular) and NOT imported from HNP `seed_catalog.py` (D1/D12). This overlay is
# merged (by pinned id) onto the catalog extracted from training.yaml; the F3
# projection renderer reads these attributes into bom.csv columns 7–19.
#
# Integrity note (lead, Issue #56): reproducing columns 7–19 is a catalog LOOKUP of
# static per-SKU facts, not a computed result. F3's validation teeth are the
# COMPUTED parts (quantities, section classification, the switch-transceiver
# distinct-physical-cage breakout dedup, the footer, and 1×/2× scaling).
#
# Keys mirror bom.csv columns. `gearbox_present`/`is_cable_assembly` are kept as
# string literals so the rendered CSV round-trips ("false"/"true").
items:
  # --- server/switch transceiver SKUs (cols 7–19) ----------------------------
  - id: { name: osfp_400g_dr4, version: "1" }
    kind: transceiver
    layer: hardware_type
    manufacturer: Generic
    model: OSFP-400G-DR4
    description: ""
    calc_profile:
      cage_type: OSFP
      medium: SMF
      connector: MPO-12
      standard: 400GBASE-DR4
      reach_class: DR
      wavelength_nm: "1310"
      host_lane_count: "4"
      host_serdes_gbps_per_lane: "100"
      optical_lane_pattern: DR4
      gearbox_present: "false"
      cable_assembly_type: none
      breakout_topology: 1x
      is_cable_assembly: "false"

  - id: { name: qsfp112_200gbase_sr2, version: "1" }
    kind: transceiver
    layer: hardware_type
    manufacturer: Generic
    model: QSFP112-200GBASE-SR2
    description: "200G QSFP112 SR2 (MPO-12) — generic placeholder; replace with vendor SKU when qualified"
    calc_profile:
      cage_type: QSFP112
      medium: MMF
      connector: MPO-12
      standard: 200GBASE-SR2
      reach_class: SR
      wavelength_nm: "850"
      host_lane_count: "2"
      host_serdes_gbps_per_lane: "100"
      optical_lane_pattern: SR2
      gearbox_present: "false"
      cable_assembly_type: none
      breakout_topology: 1x
      is_cable_assembly: "false"

