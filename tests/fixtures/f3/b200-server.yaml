# AID-owned FULL purchasable-BOM catalog fixture for the B200 GPU server (F3 Layer B).
#
# Reproduces docs/requirements/real-server-bom.csv — the owner's complete single-server
# BOM exercising R1–R5: arbitrary physical + NON-PHYSICAL line items, nested
# embeddable components with their own attributes, per-cage transceivers added as
# required subcomponents (NOT flat lines), all scaling linearly with server quantity.
#
# Provenance (note §3.1; D1/D12): AID-owned public-fact reference data authored by
# hand from the owner artifact — NOT imported from HNP. Self-contained catalog (the
# B200 server CLASS + CX-7 NIC type + BF3 DPU type + a cage transceiver type); a plan
# references `smc-b200-8gpu` and the F3 reducer emits the full BOM.
#
# Modeling (note §3.1):
#   - The 13 real-server-bom.csv line types: 11 are `bom_line_templates` on the
#     server class; the 2 "AOC NETWORK" rows (CX-7 ×8, BF3 ×1) are NESTED
#     `component_slots` whose referenced types each contribute their own AOC line.
#   - 8× CX-7 = ONE quantity-bearing slot (quantity: 8) over the faithful
#     one-QSFP112-cage CX-7 type — not a synthetic 8-port NIC.
#   - BF3 DPU = one `fixed_interface` 1000BASE-T BMC (requires_transceiver: false)
#     + two QSFP112 `transceiver_cage`s @ 200G.
#   - Per-cage transceivers are added by the reducer from cage_bindings; they are
#     NOT lines in this flat CSV (the full-BOM renderer suppresses transceiver-kind
#     lines; the projection would surface them — one model, two views).
#   - `attributes.seq` is the owner's declared CSV row order (nested AOC lines
#     inherit their slot's `selection_constraints.seq`); display columns
#     (total_capacity_gb / power_w / total_power_w) are authored exact strings.
items:
  # --- bare hardware types (capability only) ---------------------------------
  - id: { name: qsfp112_cage_optic, version: "1" }
    kind: transceiver
    layer: hardware_type
    manufacturer: Generic
    model: QSFP112-200GBASE-SR2
    part_number: QSFP112-200GBASE-SR2

  - id: { name: cx7_aoc_400g, version: "1" }
    kind: nic
    layer: hardware_type
    manufacturer: NVIDIA
    model: ConnectX-7 1xNDR400G OSFP
    part_number: AOC-CX766003N-SQ0
    port_templates:
      - { name: p0, port_kind: transceiver_cage, max_speed_gbps: 400, cage_type: QSFP112, requires_transceiver: true }
    bom_line_templates:
      - category: AOC NETWORK
        inline_sku: AOC-CX766003N-SQ0
        quantity_per_instance: 1
        physical: true
        attributes:
          description: "900-9X766-003N-SQ0 1xNDR400G IB/EN OSFP Gen5x16 NoCrypto CX7---AOC-CX766003N-SQ0"
          power_w: "30.76"
          total_power_w: "246.08"

  - id: { name: bf3_dpu, version: "1" }
    kind: dpu
    layer: hardware_type
    manufacturer: NVIDIA
    model: BlueField-3 BF3220 DPU 200GbE dual port
    part_number: GPU-NVDPU-BA3220-C
    port_templates:
      - { name: bmc, port_kind: fixed_interface, max_speed_gbps: 1, cage_type: RJ45, requires_transceiver: false }
      - { name: p0, port_kind: transceiver_cage, max_speed_gbps: 200, cage_type: QSFP112, requires_transceiver: true }
      - { name: p1, port_kind: transceiver_cage, max_speed_gbps: 200, cage_type: QSFP112, requires_transceiver: true }
    bom_line_templates:
      - category: AOC NETWORK
        inline_sku: GPU-NVDPU-BA3220-C
        quantity_per_instance: 1
        physical: true
        attributes:
          description: "[DPU] BlueField-3 BF3220 DPU 200GbE dual port Crypto Enable---GPU-NVDPU-BA3220-C"
          power_w: "107"
          total_power_w: "107"

  # --- configured server CLASS: the full B200 purchasable BOM -----------------
  - id: { name: smc-b200-8gpu, version: "1" }
    kind: server
    layer: class
    manufacturer: Supermicro
    model: AS-4126GS-NBR-LCC
    part_number: AS-4126GS-NBR-LCC
    purchase_profile: { unit_of_measure: each }
    component_slots:
      # 8× CX-7 as ONE quantity-bearing slot; AOC line ordered at CSV row 8.
      - { slot_id: nic-scale-out, target: { name: cx7_aoc_400g, version: "1" }, quantity: 8, required: true, selection_constraints: { seq: 8 } }
      # 1× BlueField-3 DPU; AOC line ordered at CSV row 9.
      - { slot_id: dpu, target: { name: bf3_dpu, version: "1" }, quantity: 1, required: true, selection_constraints: { seq: 9 } }
    cage_bindings:
      # Per-cage transceivers (required subcomponents; suppressed from the flat CSV).
      - { nic_slot_id: nic-scale-out, port_index: 0, selected_transceiver: { name: qsfp112_cage_optic, version: "1" } }
      - { nic_slot_id: dpu, port_index: 0, selected_transceiver: { name: qsfp112_cage_optic, version: "1" } }
      - { nic_slot_id: dpu, port_index: 1, selected_transceiver: { name: qsfp112_cage_optic, version: "1" } }
    bom_line_templates:
      - category: Barebone
        inline_sku: "AS -4126GS-NBR-LCC"
        quantity_per_instance: 1
        physical: true
        attributes:
          seq: 1
          description: "4U H14 LCC HGX B200 8x GPU, H14DSG-OD, CSE-GP403TS"
          total_power_w: "824"
      - category: EWCSC
        inline_sku: EWCSC
        quantity_per_instance: 1
        physical: false
        attributes:
          seq: 2
          description: "0% 3 YRS LABOR, 3 YRS PARTS, 1 YR CRS UNDER LIMITED WRNTY"
          power_w: "N/A"
          total_power_w: "N/A"
      - category: GPU Board
        inline_sku: GPU-NVHGX-B200-8180-LC
        quantity_per_instance: 1
        physical: true
        attributes:
          seq: 3
          description: "GPU Baseboard Liquid Cooled, HGX B200 8-GPU 180GB"
          power_w: "9335"
          total_power_w: "9335"
      - category: CPU
        inline_sku: PSE-TUR9575F-1554
        quantity_per_instance: 2
        physical: true
        attributes:
          seq: 4
          description: "Turin 9575F DP/UP 64C/128T 3.3G 256MB 400W SP5 HF,RoHS---PSE-TUR9575F-1554"
          power_w: "400"
          total_power_w: "800"
      - category: MEMORY
        inline_sku: MEM-DR512L-CL01-ER64
        quantity_per_instance: 24
        physical: true
        attributes:
          seq: 5
          description: "128GB DDR5 RDIMM 6400 ECC REG---MEM-DR512L-CL01-ER64"
          total_capacity_gb: "3072"
          power_w: "14.2"
          total_power_w: "340.8"
      - category: Drive
        inline_sku: HDS-MUN-MTFDKCC3T8TGP-15
        quantity_per_instance: 2
